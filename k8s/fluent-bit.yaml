apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: default
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
    [INPUT]
        Name          tail
        Path          /var/log/containers/falco-*.log
        Tag           falco.*
        Refresh_Interval 5
        Skip_Long_Lines On
    [FILTER]
        Name          grep
        Match         falco.*
        Regex         log Warning|Critical|Error
    [OUTPUT]
        Name          http
        Match         falco.*
        Host          localhost
        Port          8080
        URI           /
        Format        json_lines
        tls           off
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: default
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.0
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
        - name: log-forwarder
          image: acrfypfyp.azurecr.io/log-forwarder:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVICEBUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: servicebus-secret
                  key: connection-string
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config
          configMap:
            name: fluent-bit-config